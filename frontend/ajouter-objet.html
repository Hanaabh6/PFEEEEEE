<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliBuild - Ajouter un objet</title>
    <script src="config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --ib-green: #059669;
            --ib-green-dark: #047857;
            --ib-ink: #0f172a;
        }
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            background:
                linear-gradient(120deg, rgba(15, 23, 42, .76), rgba(4, 120, 87, .38)),
                url('https://images.pexels.com/photos/4040649/pexels-photo-4040649.jpeg') center/cover fixed;
        }
        .shell {
            background: rgba(248, 250, 252, .94);
            border: 1px solid rgba(255, 255, 255, .5);
            border-radius: 22px;
            box-shadow: 0 24px 70px rgba(15, 23, 42, .28);
            backdrop-filter: blur(16px);
        }
        .object-card {
            min-height: 104px;
            border: 1px solid #dbe3ef;
            border-radius: 16px;
            background: #fff;
            color: var(--ib-ink);
            cursor: pointer;
            transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease, background .18s ease;
        }
        .object-card:hover {
            transform: translateY(-2px);
            border-color: rgba(5, 150, 105, .55);
            box-shadow: 0 16px 30px rgba(15, 23, 42, .12);
        }
        .object-card.active {
            border-color: var(--ib-green);
            background: #ecfdf5;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, .18);
        }
        .object-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            background: #eef2f7;
            color: var(--ib-green-dark);
            font-size: 18px;
            flex: 0 0 auto;
        }
        .object-card.active .object-icon {
            background: var(--ib-green);
            color: #fff;
        }
        .add-type-card {
            border-style: dashed;
            background: rgba(255, 255, 255, .72);
        }
        .field-label {
            display: block;
            margin-bottom: 8px;
            color: #334155;
            font-size: 13px;
            font-weight: 800;
        }
        .field-input,
        .field-select {
            width: 100%;
            min-height: 48px;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            background: #fff;
            padding: 12px 14px;
            color: #0f172a;
            outline: none;
            transition: border-color .18s ease, box-shadow .18s ease;
        }
        .field-input:focus,
        .field-select:focus {
            border-color: var(--ib-green);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, .16);
        }
        .soft-panel {
            border: 1px solid #e2e8f0;
            border-radius: 18px;
            background: rgba(255, 255, 255, .78);
        }
        .primary-btn {
            min-height: 52px;
            border-radius: 15px;
            background: var(--ib-green);
            color: #fff;
            font-weight: 900;
            box-shadow: 0 16px 28px rgba(5, 150, 105, .24);
            transition: transform .18s ease, background .18s ease, box-shadow .18s ease;
        }
        .primary-btn:hover {
            background: var(--ib-green-dark);
            transform: translateY(-1px);
            box-shadow: 0 18px 32px rgba(5, 150, 105, .3);
        }
        .secondary-btn {
            min-height: 52px;
            border-radius: 15px;
            border: 1px solid #cbd5e1;
            background: #fff;
            color: #334155;
            font-weight: 900;
        }
        button:disabled {
            opacity: .62;
            cursor: not-allowed;
            transform: none !important;
        }
        .fade-in {
            animation: fadeIn .22s ease both;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex">
    <script src="sidebar-loader.js"></script>

    <main class="flex-1 p-4 md:p-8">
        <div class="max-w-6xl mx-auto">
            <div class="shell p-5 md:p-8">
                <div class="flex flex-col gap-2 mb-7">
                    <span class="inline-flex w-fit items-center gap-2 rounded-full bg-emerald-50 px-3 py-1 text-xs font-black text-emerald-700">
                        <i class="fas fa-cube"></i> IntelliBuild
                    </span>
                    <h1 class="text-3xl md:text-4xl font-black text-slate-900">Ajouter un objet</h1>
                </div>

                <form id="addForm" class="space-y-6">
                    <section class="soft-panel p-4 md:p-5">
                        <div class="flex items-center justify-between gap-4 mb-4">
                            <label class="field-label mb-0">Type d'objet</label>
                            <button type="button" id="reloadTypesBtn" class="text-sm font-black text-emerald-700 hover:text-emerald-900">
                                <i class="fas fa-rotate-right mr-1"></i> Actualiser
                            </button>
                        </div>

                        <div id="typeGrid" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-5 gap-3"></div>

                        <div id="customTypePanel" class="hidden fade-in mt-4 rounded-2xl border border-emerald-100 bg-emerald-50/70 p-3">
                            <div class="flex flex-col sm:flex-row gap-3">
                                <input id="customTypeInput" type="text" maxlength="60" class="field-input" placeholder="Nouveau type d'objet">
                                <button type="button" id="saveCustomTypeBtn" class="primary-btn px-5">
                                    Ajouter
                                </button>
                            </div>
                        </div>
                    </section>

                    <section class="soft-panel p-4 md:p-5">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label class="field-label" for="objLocalName">Nom de l'objet</label>
                                <input id="objLocalName" type="text" required maxlength="120" class="field-input" placeholder="Ex: Lampe Bureau 302">
                            </div>
                            <div>
                                <label class="field-label" for="objFloor">Etage</label>
                                <select id="objFloor" required class="field-select" disabled>
                                    <option value="">Chargement des etages...</option>
                                </select>
                            </div>
                            <div>
                                <label class="field-label" for="objRoom">Salle / localisation</label>
                                <select id="objRoom" required class="field-select" disabled>
                                    <option value="">Choisissez d'abord un etage</option>
                                </select>
                            </div>
                        </div>
                    </section>

                    <div class="flex flex-col sm:flex-row gap-3">
                        <button type="button" id="cancelBtn" class="secondary-btn flex-1">
                            Annuler
                        </button>
                        <button type="submit" id="submitBtn" class="primary-btn flex-1">
                            <i class="fas fa-floppy-disk mr-2"></i> Enregistrer
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        const apiBase = window.APP_CONFIG.API_BASE;
        const token = localStorage.getItem('userToken');
        if (!token) window.location.href = 'login.html';

        const typeGrid = document.getElementById('typeGrid');
        const customTypePanel = document.getElementById('customTypePanel');
        const customTypeInput = document.getElementById('customTypeInput');
        const saveCustomTypeBtn = document.getElementById('saveCustomTypeBtn');
        const reloadTypesBtn = document.getElementById('reloadTypesBtn');
        const addForm = document.getElementById('addForm');
        const submitBtn = document.getElementById('submitBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const objLocalName = document.getElementById('objLocalName');
        const objFloor = document.getElementById('objFloor');
        const objRoom = document.getElementById('objRoom');

        let catalogItems = [];
        let customTypes = [];
        let selectedType = null;
        let currentTdId = '';
        let currentTd = null;
        let tdLoading = false;
        let layoutFloors = [];

        function authHeaders(extra) {
            return Object.assign({ Authorization: `Bearer ${token}` }, extra || {});
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function normalizeType(value) {
            return String(value || '')
                .trim()
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '');
        }

        function getIconForType(type) {
            const normalized = normalizeType(type);
            if (normalized.includes('eclairage') || normalized.includes('light')) return 'fa-lightbulb';
            if (normalized.includes('microphone')) return 'fa-microphone';
            if (normalized.includes('camera')) return 'fa-video';
            if (normalized.includes('capteur') || normalized.includes('sensor')) return 'fa-wave-square';
            if (normalized.includes('climatiseur') || normalized.includes('hvac')) return 'fa-temperature-three-quarters';
            if (normalized.includes('interrupteur') || normalized.includes('switch')) return 'fa-toggle-on';
            if (normalized.includes('cafe') || normalized.includes('coffee')) return 'fa-mug-hot';
            if (normalized.includes('television') || normalized.includes('tv')) return 'fa-tv';
            if (normalized.includes('scanner')) return 'fa-barcode';
            if (normalized.includes('bouton') || normalized.includes('button')) return 'fa-circle-dot';
            if (normalized.includes('acces') || normalized.includes('badge')) return 'fa-id-card';
            if (normalized.includes('alarme') || normalized.includes('alarm')) return 'fa-bell';
            if (normalized.includes('imprimante') || normalized.includes('printer')) return 'fa-print';
            if (normalized.includes('haut-parleur') || normalized.includes('speaker')) return 'fa-volume-high';
            return 'fa-microchip';
        }

        function cardTemplate(item) {
            const active = selectedType && selectedType.key === item.key ? ' active' : '';
            const customBadge = item.custom ? '<span class="mt-2 inline-flex rounded-full bg-white px-2 py-1 text-[11px] font-black text-emerald-700">Perso</span>' : '';
            return `
                <button type="button" class="object-card${active} p-3 text-left" data-type-key="${escapeHtml(item.key)}">
                    <span class="flex items-start gap-3">
                        <span class="object-icon"><i class="fas ${getIconForType(item.type)}"></i></span>
                        <span class="min-w-0">
                            <span class="block text-sm font-black leading-snug">${escapeHtml(item.type)}</span>
                            ${customBadge}
                        </span>
                    </span>
                </button>
            `;
        }

        function allTypeItems() {
            const seen = new Set();
            const items = [];

            catalogItems.forEach(function (item) {
                const type = String(item.type || item.title || item.name || 'Objet IoT').trim();
                const key = normalizeType(type);
                if (!key || seen.has(key)) return;
                seen.add(key);
                items.push({
                    key: key,
                    td_id: item.td_id,
                    type: type,
                    custom: false
                });
            });

            customTypes.forEach(function (type) {
                const key = normalizeType(type);
                if (!key || seen.has(key)) return;
                seen.add(key);
                items.push({
                    key: key,
                    td_id: '__custom__',
                    type: type,
                    custom: true
                });
            });

            return items;
        }

        function renderTypes() {
            const items = allTypeItems();
            const cards = items.map(cardTemplate).join('');
            const addCard = `
                <button type="button" id="addTypeBtn" class="object-card add-type-card p-3 text-left">
                    <span class="flex items-start gap-3">
                        <span class="object-icon"><i class="fas fa-plus"></i></span>
                        <span class="min-w-0">
                            <span class="block text-sm font-black leading-snug">Ajouter un type</span>
                        </span>
                    </span>
                </button>
            `;

            typeGrid.innerHTML = cards + addCard;

            typeGrid.querySelectorAll('[data-type-key]').forEach(function (card) {
                card.addEventListener('click', function () {
                    const key = card.getAttribute('data-type-key');
                    const item = allTypeItems().find(function (candidate) { return candidate.key === key; });
                    if (item) selectType(item);
                });
            });

            document.getElementById('addTypeBtn').addEventListener('click', function () {
                customTypePanel.classList.toggle('hidden');
                if (!customTypePanel.classList.contains('hidden')) customTypeInput.focus();
            });
        }

        async function loadCatalog() {
            reloadTypesBtn.disabled = true;
            typeGrid.innerHTML = '<div class="col-span-full rounded-2xl bg-white p-5 text-sm font-bold text-slate-500">Chargement des types...</div>';
            currentTdId = '';
            currentTd = null;
            selectedType = null;

            try {
                const response = await fetch(`${apiBase}/wot/things`, {
                    headers: authHeaders()
                });
                const payload = await response.json().catch(function () { return {}; });
                if (!response.ok) {
                    throw new Error(payload.detail || 'Impossible de charger les types.');
                }

                catalogItems = Array.isArray(payload.items) ? payload.items : [];
                renderTypes();
            } catch (error) {
                console.error('Erreur catalogue:', error);
                catalogItems = [];
                renderTypes();
                alert(error.message || 'Erreur de chargement des types.');
            } finally {
                reloadTypesBtn.disabled = false;
            }
        }

        async function selectType(item) {
            selectedType = item;
            currentTdId = item.td_id;
            currentTd = null;
            renderTypes();

            if (item.custom) {
                currentTd = { custom: true, category: item.type };
                return;
            }

            tdLoading = true;
            submitBtn.disabled = true;
            try {
                const response = await fetch(`${apiBase}/wot/things/${encodeURIComponent(item.td_id)}/td`, {
                    headers: authHeaders()
                });
                const payload = await response.json().catch(function () { return {}; });
                if (!response.ok) {
                    throw new Error(payload.detail || 'Impossible de preparer ce type.');
                }
                currentTd = payload.thingDescription || {};
            } catch (error) {
                console.error('Erreur type:', error);
                selectedType = null;
                currentTdId = '';
                currentTd = null;
                renderTypes();
                alert(error.message || 'Erreur lors de la selection du type.');
            } finally {
                tdLoading = false;
                submitBtn.disabled = false;
            }
        }

        function saveCustomType() {
            const value = String(customTypeInput.value || '').trim();
            if (!value) {
                customTypeInput.focus();
                return;
            }

            const existing = allTypeItems().find(function (item) {
                return item.key === normalizeType(value);
            });
            if (existing) {
                customTypeInput.value = '';
                customTypePanel.classList.add('hidden');
                selectType(existing);
                return;
            }

            customTypes.push(value);
            customTypeInput.value = '';
            customTypePanel.classList.add('hidden');
            renderTypes();
            const created = allTypeItems().find(function (item) {
                return item.key === normalizeType(value);
            });
            if (created) selectType(created);
        }

        function createOption(value, label) {
            const option = document.createElement('option');
            option.value = value;
            option.textContent = label;
            return option;
        }

        function populateFloors(floors) {
            layoutFloors = (Array.isArray(floors) ? floors : []).filter(function (floor) {
                const id = Number(floor && floor.id);
                return id >= 0 && id <= 11;
            });

            objFloor.innerHTML = '';
            objFloor.appendChild(createOption('', '-- Choisir un etage --'));

            layoutFloors.forEach(function (floor) {
                objFloor.appendChild(createOption(String(floor.name || ''), String(floor.name || 'Etage')));
            });

            objFloor.disabled = layoutFloors.length === 0;
            objRoom.innerHTML = '';
            objRoom.appendChild(createOption('', "Choisissez d'abord un etage"));
            objRoom.disabled = true;
        }

        function populateRoomsForFloor(floorName) {
            const selectedFloor = layoutFloors.find(function (floor) {
                return String(floor.name || '') === String(floorName || '');
            });

            objRoom.innerHTML = '';
            objRoom.appendChild(createOption('', '-- Choisir une salle --'));

            const rooms = selectedFloor && Array.isArray(selectedFloor.rooms) ? selectedFloor.rooms : [];
            rooms.forEach(function (room) {
                const cleanRoom = String(room || '').trim();
                if (cleanRoom) objRoom.appendChild(createOption(cleanRoom, cleanRoom));
            });

            objRoom.disabled = rooms.length === 0;
        }

        async function loadRooms() {
            objFloor.disabled = true;
            objRoom.disabled = true;
            objFloor.innerHTML = '<option value="">Chargement des etages...</option>';
            objRoom.innerHTML = '<option value="">Chargement des salles...</option>';

            try {
                const response = await fetch(`${apiBase}/localisation/layout`, { method: 'GET' });
                const data = await response.json().catch(function () { return {}; });
                if (!response.ok) {
                    throw new Error((data && data.detail) || 'Impossible de charger les salles.');
                }
                populateFloors(Array.isArray(data.floors) ? data.floors : []);
            } catch (error) {
                console.error('Erreur chargement salles:', error);
                objFloor.innerHTML = '<option value="">Impossible de charger les etages</option>';
                objRoom.innerHTML = '<option value="">Impossible de charger les salles</option>';
            }
        }

        addForm.addEventListener('submit', async function (event) {
            event.preventDefault();

            if (!selectedType || !currentTdId) {
                alert("Veuillez choisir un type d'objet.");
                return;
            }
            if (tdLoading) {
                alert('Preparation du type en cours, reessayez dans un instant.');
                return;
            }
            if (!selectedType.custom && !currentTd) {
                alert("Veuillez selectionner a nouveau le type d'objet.");
                return;
            }

            const localName = String(objLocalName.value || '').trim();
            const floor = String(objFloor.value || '').trim();
            const room = String(objRoom.value || '').trim();

            if (!localName) {
                alert("Veuillez saisir le nom de l'objet.");
                objLocalName.focus();
                return;
            }
            if (!floor) {
                alert('Veuillez choisir un etage.');
                objFloor.focus();
                return;
            }
            if (!room) {
                alert('Veuillez choisir une salle.');
                objRoom.focus();
                return;
            }

            submitBtn.disabled = true;

            try {
                const body = {
                    td_id: currentTdId,
                    local_name: localName,
                    floor: floor,
                    room: room
                };
                if (selectedType.custom) {
                    body.custom_type = selectedType.type;
                }

                const response = await fetch(`${apiBase}/things/from-td`, {
                    method: 'POST',
                    headers: authHeaders({ 'Content-Type': 'application/json' }),
                    body: JSON.stringify(body)
                });

                const payload = await response.json().catch(function () { return {}; });
                if (!response.ok) {
                    alert(payload.detail || "Erreur lors de l'ajout de l'objet.");
                    return;
                }

                alert(payload.message || 'Objet ajoute avec succes.');
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Erreur creation:', error);
                alert('Erreur de connexion au serveur.');
            } finally {
                submitBtn.disabled = false;
            }
        });

        objFloor.addEventListener('change', function () {
            populateRoomsForFloor(objFloor.value);
        });

        saveCustomTypeBtn.addEventListener('click', saveCustomType);
        customTypeInput.addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                saveCustomType();
            }
        });
        reloadTypesBtn.addEventListener('click', loadCatalog);
        cancelBtn.addEventListener('click', function () {
            window.location.href = 'index.html';
        });

        loadCatalog();
        loadRooms();
    </script>
</body>
</html>
